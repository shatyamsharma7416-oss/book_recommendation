<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Folio — Book Recommendations{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <span class="logo-icon">📖</span>
      <span class="logo-text">Folio</span>
    </a>

    <div class="search-wrap" id="searchWrap">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search books..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="searchClear" aria-label="Clear">x</button>
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="nav-tagline">Discover your next great read</div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-brand">Folio</p>
      <p class="footer-sub">Curated books for curious minds</p>
    </div>
  </footer>

  <script src="/static/js/main.js"></script>
</body>
</html>
